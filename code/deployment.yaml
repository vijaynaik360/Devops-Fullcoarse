apiVersion: v1
kind: Service
metadata:
  labels:
    app: my-deployment
  name: my-deploylb
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 8501
  selector:
    app: my-deployment
  type: LoadBalancer
status:
  loadBalancer: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: my-deployment
  name: my-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-deployment
  template:
    metadata:
      labels:
        app: my-deployment
    spec:
      containers:
      - image: replace
        name: custom-image
        ports:
          - containerPort: 8501